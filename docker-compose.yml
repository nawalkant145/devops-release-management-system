version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: release_mgmt_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: release_mgmt
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d release_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: release_mgmt_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/release_mgmt
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: devops-release-mgmt-super-secret-jwt-key-2024
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ./frontend
    container_name: release_mgmt_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
